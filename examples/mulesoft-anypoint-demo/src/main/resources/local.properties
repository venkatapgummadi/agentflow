# ──────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT PROPERTIES
# Copy this file and rename to: local.properties
# DO NOT commit credentials to version control
# ──────────────────────────────────────────────────────────

# HTTP Listener
http.port=8081

# AgentFlow Python Engine (run: uvicorn agentflow.server:app --port 8000)
agentflow.host=localhost
agentflow.port=8000
agentflow.protocol=http

# Anypoint API Manager credentials (from your API Manager instance)
anypoint.client_id=YOUR_CLIENT_ID_HERE
anypoint.client_secret=YOUR_CLIENT_SECRET_HERE
